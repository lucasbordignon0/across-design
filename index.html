<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Across Design</title>
    <style>
      /* Prevent FOUC — critical styles before JS/CSS modules load */
      body { background: #6CF9D8; margin: 0; }
      #nav, #hero, #footer, #poster-label, #scroll-track { visibility: hidden; }
      #loader { position: fixed; inset: 0; z-index: 100; background: #6CF9D8; display: flex; align-items: center; justify-content: center; }
      .loader-inner { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; }
      .loader-stars { width: 104px; height: 104px; }
      .loader-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #151518; }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loader">
      <div class="loader-inner">
        <img src="/acrossStars.svg" alt="" class="loader-stars" />
        <span class="loader-pct">0</span>
      </div>
    </div>

    <canvas id="spiral"></canvas>

    <!-- Navigation -->
    <nav id="nav">
      <div class="nav-logo">
        <img src="/acrossLogo.svg" alt="Across" class="nav-logo-icon" />
        <img src="/acrossDesign.svg" alt="Design" class="nav-logo-text" />
      </div>
      <div class="nav-links">
        <a href="/guide.html">FOUNDATIONS</a>
        <a href="/guide.html">LANGUAGE</a>
        <a href="/guide.html">RESOURCES</a>
      </div>
    </nav>

    <!-- Hero (visible at start of scroll) -->
    <div id="hero">
      <div class="hero-emblem">
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossGriffin.svg" alt="Across Griffin" class="hero-griffin" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
      </div>
      <p class="hero-tagline">
        THE FASTEST WAY TO MOVE<br />
        YOUR MONEY ACROSS<br />
        EVERY NETWORK<br />
        ONCHAIN
      </p>
    </div>

    <!-- Footer (visible at end of scroll) -->
    <div id="footer">
      <img src="/acrossStars.svg" alt="Across Stars" class="footer-stars" />
      <p class="footer-text">
        OFFICIAL BRAND GUIDELINES<br />
        BY ACROSS DESIGN TEAM<br />
        2026
      </p>
    </div>

    <!-- Poster hover label -->
    <div id="poster-label"></div>

    <!-- Scroll capture overlay -->
    <div id="scroll-track"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
