<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Across Design</title>
  </head>
  <body>
    <canvas id="spiral"></canvas>

    <!-- Navigation -->
    <nav id="nav">
      <div class="nav-logo">
        <img src="/acrossLogo.svg" alt="Across" class="nav-logo-icon" />
        <img src="/acrossDesign.svg" alt="Design" class="nav-logo-text" />
      </div>
      <div class="nav-links">
        <a href="#">FOUNDATIONS</a>
        <a href="#">LANGUAGE</a>
        <a href="#">RESOURCES</a>
      </div>
    </nav>

    <!-- Hero (visible at start of scroll) -->
    <div id="hero">
      <div class="hero-emblem">
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossGriffin.svg" alt="Across Griffin" class="hero-griffin" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
        <img src="/acrossXthicker.svg" alt="" class="hero-x" />
      </div>
      <p class="hero-tagline">
        THE FASTEST WAY TO MOVE<br />
        YOUR MONEY ACROSS<br />
        EVERY NETWORK<br />
        ONCHAIN
      </p>
    </div>

    <!-- Footer (visible at end of scroll) -->
    <div id="footer">
      <img src="/acrossStars.svg" alt="Across Stars" class="footer-stars" />
      <p class="footer-text">
        OFFICIAL BRAND GUIDELINES<br />
        BY ACROSS DESIGN TEAM<br />
        2026
      </p>
    </div>

    <!-- Scroll capture overlay -->
    <div id="scroll-track"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
